<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Presence - Interface</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Enhanced custom styles with modern aesthetics */
      body { 
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; 
        background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 100%);
        min-height: 100vh;
      }
      .form-input { 
        width:100%; 
        padding:.5rem .75rem; 
        border:1px solid #e2e8f0; 
        border-radius:.75rem; 
        background:#fff;
        transition: all 0.2s ease;
        font-size: 0.875rem;
      }
      .form-input:focus { 
        outline:none; 
        box-shadow:0 0 0 3px rgba(59,130,246,0.15); 
        border-color:#3b82f6; 
      }
      .form-input:hover {
        border-color: #cbd5e1;
      }
      .btn-primary { 
        padding:.5rem 1.25rem; 
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
        color:#fff; 
        border-radius:.75rem; 
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
      }
      .btn-success { 
        padding:.5rem 1.25rem; 
        background: linear-gradient(135deg, #10b981 0%, #047857 100%); 
        color:#fff; 
        border-radius:.75rem; 
        font-weight: 600;
        transition: all 0.2s ease;
        box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
      }
      .btn-success:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(16, 185, 129, 0.3);
      }
      .btn-outline { 
        padding:.4rem 1rem; 
        background:#fff; 
        color:#1e293b; 
        border-radius:.75rem; 
        border:1px solid #e2e8f0;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .btn-outline:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
      }
      .video-el { 
        width:100%; 
        height:12rem; 
        object-fit:cover; 
        border-radius:.75rem; 
        border:2px solid #e2e8f0; 
        background:#0f172a;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .video-main { 
        height: 28rem !important;
        border: 3px solid #e2e8f0;
      }
      .video-card { 
        position:relative; 
        display:inline-block;
        border-radius: 1rem;
        overflow: hidden;
      }
      .presence-badge { 
        position:absolute; 
        left:1rem; 
        top:1rem; 
        background:rgba(0,0,0,0.75); 
        backdrop-filter: blur(10px);
        color:#fff; 
        padding:.5rem 1rem; 
        border-radius:999px; 
        font-size:.875rem;
        font-weight: 600;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      }
      .nav-btn { 
        transition: all 0.2s ease;
        font-weight: 500;
      }
      .nav-btn.active { 
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); 
        color:#1d4ed8; 
        border-right:3px solid #3b82f6;
        font-weight: 600;
      }
      .nav-btn:hover:not(.active) {
        background: #f8fafc;
        color: #1e293b;
      }
      .card-stat {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 1.5rem;
        transition: transform 0.2s ease;
      }
      .card-stat:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      .status-idle { background: rgba(107, 114, 128, 0.75) !important; }
      .status-detecting { background: rgba(234, 179, 8, 0.75) !important; }
      .status-success { background: rgba(16, 185, 129, 0.75) !important; }
      .progress-bar {
        height: 8px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
        margin: 0.5rem 0;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #10b981, #059669, #047857);
        border-radius: 999px;
        transition: width 0.3s ease;
      }
      .logo-container {
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        width: 3rem;
        height: 3rem;
        border-radius: 0.875rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
      }
      .logo-icon {
        font-size: 1.25rem;
        color: white;
        font-weight: bold;
      }
      .section-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        color: #0f172a;
      }
      .section-header i {
        color: #3b82f6;
        background: #dbeafe;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pulse {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen">
      <header class="bg-white shadow-lg border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between h-20">
            <div class="flex items-center gap-4">
              <!-- Modern Bear Logo -->
              <div class="logo-container">
                <i class="logo-icon fas fa-paw"></i>
              </div>
              <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent">Smart Presence</h1>
                <p class="text-sm text-gray-500">Sistem absensi otomatis — Universitas Harkat Negeri</p>
              </div>
            </div>
            <div class="flex items-center gap-4">
              <div class="text-sm text-gray-500">Demo UI · Lokal</div>
              <div class="w-3 h-3 bg-green-500 rounded-full pulse"></div>
            </div>
          </div>
        </div>
      </header>

      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
          <aside class="lg:w-72 bg-white rounded-2xl shadow-xl border border-gray-200 p-6">
            <nav class="space-y-2">
              <button 
                onclick="pageLoader.loadPage('registrasi')"
                id="nav-registrasi"
                class="w-full text-left px-4 py-3 rounded-xl nav-btn flex items-center gap-3 active"
              >
                <i class="fas fa-user-plus"></i>
                Absensi & Registrasi
              </button>
              <button 
                onclick="pageLoader.loadPage('dashboard')"
                id="nav-dashboard"
                class="w-full text-left px-4 py-3 rounded-xl nav-btn flex items-center gap-3"
              >
                <i class="fas fa-chart-line"></i>
                Dashboard Rekap
              </button>
              <button 
                onclick="pageLoader.loadPage('data')"
                id="nav-data"
                class="w-full text-left px-4 py-3 rounded-xl nav-btn flex items-center gap-3"
              >
                <i class="fas fa-users"></i>
                Data Mahasiswa
              </button>
              <button 
                onclick="pageLoader.loadPage('laporan')"
                id="nav-laporan"
                class="w-full text-left px-4 py-3 rounded-xl nav-btn flex items-center gap-3"
              >
                <i class="fas fa-file-alt"></i>
                Laporan Absensi
              </button>
            </nav>
          </aside>

          <main class="flex-1" id="page-container">
            <!-- Page content akan dimuat dinamis di sini -->
            <div class="text-center text-gray-400 py-12">
              <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
              <p>Memuat halaman...</p>
            </div>
          </main>
        </div>
      </div>

      <script src="/static/js/pages.js?v=4"></script>
      <script>
        // Auto-load default page on startup
        document.addEventListener('DOMContentLoaded', function() {
          console.log('[Index] DOM loaded, loading default page: registrasi');
          pageLoader.loadPage('registrasi');
        });
      </script>
      <script src="/static/js/app.js"></script>
    </div>
  </body>
</html>
