<section id="page-registrasi" class="bg-white rounded-2xl shadow-xl border border-gray-200 p-8">
  <div class="section-header">
    <i class="fas fa-user-plus"></i>
    <h3 class="text-2xl font-bold text-gray-900">Registrasi Mahasiswa</h3>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Mahasiswa</label>
      <select id="reg-select-nim" class="form-input">
        <option value="">-- Pilih Mahasiswa --</option>
      </select>
      <div class="text-xs text-blue-600 bg-blue-50 p-3 rounded-lg mt-3">
        <i class="fas fa-info-circle mr-2"></i>Jika mahasiswa belum terdaftar, tambahkan melalui halaman Admin terlebih dahulu.
      </div>
    </div>
  </div>
  <div class="mt-8 flex items-center gap-4">
    <button id="btn-to-capture" class="btn-primary flex items-center gap-2">
      <i class="fas fa-camera"></i>
      Lanjut ke Capture Wajah
    </button>
    <span id="reg-status" class="text-sm text-gray-600"></span>
  </div>

  <div id="capture-area" class="mt-10 hidden">
    <div class="flex items-center gap-2 mb-4 p-3 bg-amber-50 rounded-lg">
      <i class="fas fa-lightbulb text-amber-600"></i>
      <span class="text-sm text-amber-700">Tatap kamera, kedip untuk liveness, lakukan sedikit gerakan kepala untuk variasi pose.</span>
    </div>
    <div class="flex flex-col lg:flex-row items-start gap-8">
      <div class="w-full lg:w-80">
        <video id="small-video" class="video-el" autoplay playsinline></video>
        <div id="capture-progress" class="mt-3 text-sm text-gray-600 flex items-center gap-2">
          <i class="fas fa-circle text-gray-400"></i>
          Belum capture
        </div>
        <div class="mt-4">
          <button id="btn-start-capture" class="btn-success w-full flex items-center justify-center gap-2">
            <i class="fas fa-video"></i>
            Mulai Capture Wajah (5)
          </button>
        </div>
      </div>
      <div class="flex-1">
        <div id="capture-instructions" class="p-4 bg-gray-50 rounded-xl text-sm text-gray-700 hidden"></div>
        <div id="capture-statusbar" class="mt-6 hidden">
          <div class="progress-bar">
            <div id="progress-bar-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <div id="progress-text" class="mt-2 text-sm text-gray-600 flex items-center gap-2">
            <i class="fas fa-hourglass-half"></i>
            Menunggu...
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
